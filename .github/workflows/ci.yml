name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install in editable mode with dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -q

      - name: Verify BaseTool compatibility
        run: |
          python - <<'PY'
          from langchain_core.tools import BaseTool
          from langchain_openterms import OpenTermsGuard, OpenTermsChecker

          assert issubclass(OpenTermsGuard, BaseTool)
          assert issubclass(OpenTermsChecker, BaseTool)

          print("BaseTool compatibility: PASS")
          PY

  build:
    name: Build - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*
